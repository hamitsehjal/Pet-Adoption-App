<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" type="text/css" href="./style.css" />
    <title>Adopt Me!!</title>
  </head>
  <body>
    <div id="root">Not rendered</div>
    <!--     
    The first is the React library. This library is the interface of how to interact with React; all the methods (except one)
     will be via this library. It contains no way of rendering itself though; it's just the API. -->

    <script src="https://unpkg.com/react@17.0.2/umd/react.development.js"></script>

    <!-- The second library is the rendering layer. Since we're rendering to the browser, we're using React DOM. There are other React 
    libraries like React Native, React 360 (formerly React VR), A-Frame React, React Blessed, and others.  -->

    <script src="https://unpkg.com/react-dom@17.0.2/umd/react-dom.development.js"></script>

    <script src="./App.js"></script>
  </body>
</html>
